<h1>Vídeo</h1>

<video id="meuVideo" width="800" height="450" controls autoplay controlsList="nodownload">
    <source src="http://files.cod3r.com.br/curso-web/video.mp4" type="video/mp4">
    Seu browser não suporta a tag video.
</video>

<div progresso="meuVideo" class="progresso">
    <div></div>
</div>

<div>
    <button play="meuVideo">Play</button>
    <button pause="meuVideo">Pause</button>
</div>

<style>
    .progresso {
        height: 20px;
        width: 500px;
        border: solid 1px #444;
        margin: 20px 20px 20px 0px;
    }

    .progresso > div {
        background-color: red;
        color: #fff;
        height: 100%;
        text-align: right;
        font-size: 14px;
        width: 0%;
    }
</style>

<script>
    const video = document.getElementById('meuVideo');
    const pausar = document.querySelector('[pause]');
    const play = document.querySelector('[play]');
    const progresso = document.querySelector('.progresso > div');

    pausar.addEventListener('click', function() {
        video.pause();
    })

    play.addEventListener('click', function() {
        video.play();
    })

    video.addEventListener('timeupdate', () => {
        const tempoAtual = video.currentTime;
        const duracaoTotal = video.duration;
        const porcentagem = (tempoAtual / duracaoTotal) * 100;

        progresso.style.width = `${porcentagem}%`;
    });
</script>
