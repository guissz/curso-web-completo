<link rel="stylesheet" href="http://files.cod3r.com.br/curso-web/tree.css">

<script>
    const sublistas = document.querySelectorAll('.tree ul ul');

    sublistas.forEach(ul => {
        ul.style.display = 'none';
        ul.parentElement.style.cursor = 'pointer';
    });

    const itensLista = document.querySelectorAll('.tree li');

    itensLista.forEach(li => {
        li.addEventListener('click', function(e) {
            e.stopPropagation();

            const listaInterna = this.querySelector('ul');

            if (listaInterna) {
                if (listaInterna.style.display === 'none') {
                    listaInterna.style.display = 'block';
                } else {
                    listaInterna.style.display = 'none';
                }
            }
        });
    });
</script>
