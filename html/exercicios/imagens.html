<script>
    const slides = document.querySelectorAll('.slider p');
    let indiceAtual = 0;

    function iniciarSlider() {
        if (indiceAtual > 0) {
            slides[indiceAtual - 1].style.display = 'none';
        } else {
            slides[slides.length - 1].style.display = 'none';
        }

        slides[indiceAtual].style.display = 'block';
        indiceAtual++;

        if (indiceAtual >= slides.length) {
            indiceAtual = 0;
        }

        setTimeout(iniciarSlider, 3000);
    }

    window.onload = iniciarSlider;
</script>
